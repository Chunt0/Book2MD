services:
  app:
    build:
      context: .
      args:
        # The SPA is same-origin (empty URL) and bakes in the shared token + name.
        VITE_API_URL: ""
        VITE_AUTH_TOKEN: ${AUTH_TOKEN}
        VITE_APP_NAME: ${VITE_APP_NAME:-App}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_PATH: /data/app.db
      AUTH_TOKEN: ${AUTH_TOKEN}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - app-data:/data

  # GPU PDF→Markdown service (M0+), deterministic — no LLM. network_mode: host →
  # serves :8001 on the host. Shares ./data with the Bun app so it can read uploaded
  # PDFs by path and write extracted images back.
  marker:
    build:
      context: ./infra/marker
    image: book2md-marker
    restart: unless-stopped
    network_mode: host
    environment:
      HF_HOME: /cache/hf
      TORCH_HOME: /cache/torch
    volumes:
      - ./data:/data
      - marker-cache:/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  app-data:
  marker-cache:
